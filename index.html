<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R2R3</title>
  
  <link rel="icon" id="f" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='15' fill='%23111111'/%3E%3Ctext x='50' y='65' font-size='42' text-anchor='middle' fill='%23ffffff' font-family='Arial Black, sans-serif' font-weight='700'%3ER2R3%3C/text%3E%3C/svg%3E">

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
    body { background: #ffffff; min-height: 100vh; font-family: 'Noto Sans JP', 'Space Grotesk', sans-serif; }
    
    .futuristic-btn {
      background: #ffffff; 
      color: #0a0a0a; 
      font-weight: 600; 
      border: 2px solid #e5e5e5;
      padding: 14px 28px; 
      border-radius: 4px; 
      text-align: center; 
      display: block;
      text-decoration: none; 
      transition: all 0.4s;
    }
    .futuristic-btn:hover { 
      transform: translateY(-5px); 
      border-color: #67e8f9; 
      background: #f8f9fa; 
    }

    .latest::after {
      content: "★ 最新";
      font-size: 0.75rem;
      background: #67e8f9;
      color: #111111;
      padding: 3px 9px;
      border-radius: 9999px;
      margin-left: 10px;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div id="p-screen">
    <div class="text-center max-w-xs w-full mx-auto pt-20 px-6">
      <div style="font-family: 'Space Grotesk'; font-size: 4.5rem; font-weight: 700; letter-spacing: -0.08em; background: linear-gradient(90deg, #111, #333); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">R2R3</div>
      <p class="text-zinc-600 mt-6 mb-6">Enter Access Code</p>
      
      <input type="password" id="pin" 
        class="w-full border-2 border-zinc-300 focus:border-black rounded-lg px-6 py-4 text-center text-2xl tracking-widest focus:outline-none"
        placeholder="••••••••" autocomplete="off" maxlength="20">
      
      <button onclick="v()" class="mt-6 w-full bg-black text-white py-4 rounded-lg font-semibold">VERIFY</button>
      <p id="e" class="text-red-500 mt-4 text-sm hidden">Access Denied</p>
    </div>
  </div>

  <div id="main" class="hidden max-w-xl w-full mx-auto px-6 py-12">
    <div class="text-center mb-12">
      <div onclick="panic()" style="font-family: 'Space Grotesk'; font-size: 4.8rem; font-weight: 700; letter-spacing: -0.08em; background: linear-gradient(90deg, #111, #333); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">R2R3</div>
    </div>

    <div id="links-container" class="space-y-3">
      <a href="bookmarklet.html" class="futuristic-btn">ツール</a>
      <a href="20260310.html" class="futuristic-btn">2026/03/10</a>
      <a href="20260311.html" class="futuristic-btn">2026/03/11</a>
      <a href="20260527.html" class="futuristic-btn">2026/05/27</a>
      <a href="20260610.html" class="futuristic-btn">2026/06/10(広告無しのやつだけ)</a>
      <a href="2026-06-10truf.html" class="futuristic-btn">2026-06-10(truffledだけ)</a>
      <a href="2026-06-12.html" class="futuristic-btn">2026-06-12</a>
    </div>

    <div class="mt-10 text-center">
      <button onclick="toggleCloak()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg text-sm">
        <span id="ct">🕵️ Cloak as Classroom</span>
      </button>
    </div>
  </div>

  <script>
    let fails = 3;

    function v() {
      const input = document.getElementById('pin').value.trim().toLowerCase();
      const err = document.getElementById('e');

    
      if (btoa(input + "x9k2m") === "cjJyM3I0eDlrMm0=") {
        document.getElementById('p-screen').style.display = 'none';
        document.getElementById('main').classList.remove('hidden');
      } else {
        fails--;
        err.classList.remove('hidden');
        if (fails <= 0) {
          err.innerHTML = "Too many attempts.<br>Page will reload.";
          setTimeout(() => location.reload(), 1800);
        } else {
          setTimeout(() => err.classList.add('hidden'), 2000);
        }
        document.getElementById('pin').value = '';
      }
    }

    function panic() { location.href = "https://google.com"; }

    function toggleCloak() {
      if (document.title === "Classroom") {
        document.title = "R2R3";
        document.getElementById('f').href = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='15' fill='%23111111'/%3E%3Ctext x='50' y='65' font-size='42' text-anchor='middle' fill='%23ffffff' font-family='Arial Black, sans-serif' font-weight='700'%3ER2R3%3C/text%3E%3C/svg%3E";
        document.getElementById('ct').textContent = "🕵️ Cloak as Classroom";
      } else {
        document.title = "Classroom";
        document.getElementById('f').href = "https://ssl.gstatic.com/classroom/favicon.ico";
        document.getElementById('ct').textContent = "✅ Cloaked";
      }
    }

    // Auto apply "最新" to the last link
    window.onload = function() {
      const container = document.getElementById('links-container');
      const links = container.querySelectorAll('a');
      if (links.length > 0) {
        links.forEach(link => link.classList.remove('latest'));
        links[links.length - 1].classList.add('latest');
      }
    };

    document.getElementById('pin').addEventListener('keypress', e => {
      if (e.key === 'Enter') v();
    });
  </script>
</body>
</html>
