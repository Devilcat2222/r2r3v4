<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FuturiLink • Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap');

    body { font-family: 'Space Grotesk', sans-serif; }

    .futuristic-btn {
      position: relative;
      background: rgba(255, 255, 255, 0.93);
      color: #0a0a0a;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.45);
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 
        0 0 30px rgba(165, 243, 252, 0.4),
        0 15px 40px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(16px);
    }

    .futuristic-btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -100%;
      width: 50%;
      height: 200%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.95), transparent);
      transition: 0.8s;
    }

    .futuristic-btn:hover::before { left: 250%; }

    .futuristic-btn:hover {
      transform: translateY(-12px) scale(1.06);
      box-shadow: 
        0 0 70px rgba(165, 243, 252, 0.85),
        0 30px 70px rgba(0, 0, 0, 0.5);
      background: white;
    }
  </style>
</head>
<body class="bg-zinc-950 min-h-screen pb-12">
  <div class="max-w-7xl mx-auto px-6">
    <div class="pt-12 pb-8 text-center">
      <h1 class="text-5xl font-semibold tracking-tighter text-white">FuturiLink</h1>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <!-- Input -->
      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8">
        <h2 class="text-xl font-semibold mb-6">Paste your links (one per line)</h2>
        <textarea id="links-input" rows="16" 
          class="w-full bg-black border border-zinc-700 rounded-3xl p-6 text-white font-mono text-sm focus:border-cyan-400 focus:outline-none resize-none"
          placeholder="https://x.ai&#10;https://groq.com&#10;https://github.com"></textarea>

        <div class="mt-6 flex gap-3">
          <button onclick="generateCleanPage()" 
            class="flex-1 bg-white text-black font-semibold py-5 rounded-3xl hover:bg-cyan-300 transition-all text-lg">
            Generate Clean Page
          </button>
          <button onclick="clearAll()" class="px-8 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-3xl">
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>
      </div>

      <!-- Preview -->
      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8">
        <h2 class="text-xl font-semibold mb-6">Preview</h2>
        <div id="preview-area" class="min-h-[520px] bg-black rounded-3xl overflow-hidden border border-zinc-800 p-8"></div>
      </div>
    </div>

    <!-- Generated Code -->
    <div class="mt-12">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Full HTML Code</h2>
        <button onclick="copyFullHTML()" 
          class="px-6 py-3 bg-white text-black hover:bg-cyan-300 rounded-2xl flex items-center gap-2 font-medium">
          <i class="fa-solid fa-copy"></i> Copy Full Page
        </button>
      </div>
      <pre id="html-output" class="bg-black border border-zinc-800 rounded-3xl p-8 text-cyan-200 font-mono text-sm overflow-auto max-h-[500px]"></pre>
    </div>
  </div>

  <script>
    function generateCleanPage() {
      const input = document.getElementById('links-input').value.trim();
      if (!input) return alert("Please enter at least one link!");

      const lines = input.split('\n').filter(l => l.trim() !== '');
      let buttonsHTML = '';

      lines.forEach(link => {
        const url = link.trim();
        if (!url) return;

        let displayText = url;
        try {
          const urlObj = new URL(url.startsWith('http') ? url : 'https://' + url);
          displayText = urlObj.hostname.replace('www.', '').toUpperCase();
        } catch(e) {}

        buttonsHTML += `
      <a href="${url.startsWith('http') ? url : 'https://' + url}" 
         target="_blank" 
         class="futuristic-btn block px-10 py-8 rounded-3xl text-xl text-center">
        ${displayText}
      </a>`;
      });

      const fullPage = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <script src="https://cdn.tailwindcss.com"><\/script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap');
    
    body {
      background: #09090b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      font-family: 'Space Grotesk', sans-serif;
    }
    
    .futuristic-btn {
      position: relative;
      background: rgba(255, 255, 255, 0.93);
      color: #0a0a0a;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.45);
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 0 0 30px rgba(165, 243, 252, 0.4),
                  0 15px 40px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(16px);
    }
    
    .futuristic-btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -100%;
      width: 50%;
      height: 200%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.95), transparent);
      transition: 0.8s;
    }
    
    .futuristic-btn:hover::before { left: 250%; }
    
    .futuristic-btn:hover {
      transform: translateY(-12px) scale(1.06);
      box-shadow: 0 0 70px rgba(165, 243, 252, 0.85),
                  0 30px 70px rgba(0, 0, 0, 0.5);
      background: white;
    }
  </style>
</head>
<body>
  <div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
${buttonsHTML}
  </div>
</body>
</html>`;

      // Preview
      document.getElementById('preview-area').innerHTML = `
        <iframe srcdoc="${fullPage.replace(/"/g, '&quot;')}" 
                class="w-full h-full border-0 rounded-3xl"></iframe>`;

      document.getElementById('html-output').textContent = fullPage;
    }

    function copyFullHTML() {
      const code = document.getElementById('html-output').textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = event.target;
        const orig = btn.innerHTML;
        btn.innerHTML = `<i class="fa-solid fa-check"></i> Copied!`;
        setTimeout(() => btn.innerHTML = orig, 2000);
      });
    }

    function clearAll() {
      document.getElementById('links-input').value = '';
      document.getElementById('preview-area').innerHTML = '';
      document.getElementById('html-output').textContent = '';
    }
  </script>
</body>
</html>
